// App code
const { useState, useMemo } = React;
const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

// ─── THEME ────────────────────────────────────────────────────────────────────
const C = {
  bg:"#0A0E1A", card:"#141B2D", border:"#1E2D45",
  accent:"#00D4AA", accentDim:"#00D4AA22", gold:"#F5C842",
  red:"#FF5757", blue:"#4A9EFF", text:"#F0F4FF", muted:"#8899BB", inputBg:"#0D1526",
};

// ─── PURE MATH (all verified cell-by-cell against Excel) ─────────────────────
const n   = v => parseFloat(v) || 0;
const fmt = v => new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(v??0);
const fmtPct = v => `${((v??0)*100).toFixed(2)}%`;
const r100 = v => Math.round(v/100)*100;   // ROUND(-2)
const r5   = v => Math.round(v/5)*5;
const ceil = v => Math.ceil(v);            // ROUNDUP(...,0)

// Canadian semi-annual compounding rate per payment period (Excel BP16 formula)
const canadianRate = (annual, ppy=12) => Math.pow(1 + annual/2, 2/ppy) - 1;

// PMT using Canadian rate
function canadianPmt(principal, annualRate, amortYears, ppy=12) {
  if (!principal || !annualRate) return 0;
  const r = canadianRate(annualRate, ppy);
  const nper = amortYears * ppy;
  return Math.round(principal * r / (1 - Math.pow(1+r,-nper)) * 100) / 100;
}

// Excel FV(rate, nper, pmt, pv, 0) — annual compounding (AL3 is annual rate, nper=years)
// FV = -pv*(1+rate)^nper - pmt*((1+rate)^nper - 1)/rate
function excelFV(rate, nper, pmt, pv) {
  if (rate === 0) return -pv - pmt * nper;
  return -pv * Math.pow(1+rate, nper) - pmt * (Math.pow(1+rate, nper) - 1) / rate;
}

// CMHC — AK19 formula exactly:
// IF(amort<=25): 5-9.99%→4%, 10-14.99%→3.1%, 15-19.99%→2.8%
// IF(amort>25):  5-9.99%→4.2%, 10-14.99%→3.3%, 15-19.99%→3.0%
// Base = homePrice - downPayment (AU8)
function calcCMHC(price, down, amort) {
  const dpPct = down / price;
  if (dpPct >= 0.20 || dpPct < 0.05) return 0;
  const base = price - down;
  if (amort <= 25) {
    if (dpPct <= 0.0999) return base * 0.040;
    if (dpPct <= 0.1499) return base * 0.031;
    return base * 0.028;
  } else {
    if (dpPct <= 0.0999) return base * 0.042;
    if (dpPct <= 0.1499) return base * 0.033;
    return base * 0.030;
  }
}

// Min down payment — AV22 formula exactly:
// IF(E9<=500000, 5%*E9, IF(AND(E9>500000, E9<=1499999), 25000+10%*(E9-500000), IF(E9>=1500000, 20%*E9)))
function minDown(price) {
  if (price <= 500000)  return price * 0.05;
  if (price <= 1499999) return 25000 + (price - 500000) * 0.10;
  return price * 0.20;
}

// Stress test rate
const stressRate = r => Math.max(r + 0.02, 0.0525);

// Build yearly amort summary — uses ROUNDUP(SUM(...)) as in T40:U40 formula
function buildYearlySummary(principal, annualRate, amortYears) {
  const r = canadianRate(annualRate);
  const pmt = canadianPmt(principal, annualRate, amortYears);
  let balance = principal;
  let cumInt = 0, cumPrin = 0;
  const rows = [];
  for (let yr = 1; yr <= amortYears; yr++) {
    for (let m = 0; m < 12; m++) {
      const intPmt = Math.round(r * balance * 100) / 100;
      const prinPmt = (balance - (pmt - intPmt) < 0) ? balance : pmt - intPmt;
      cumInt  += intPmt;
      cumPrin += prinPmt;
      balance  = Math.max(0, balance - prinPmt);
    }
    rows.push({ year: yr, principalPaid: ceil(cumPrin), interestPaid: ceil(cumInt) });
  }
  return rows;
}

// Full payment-by-payment schedule for Amort tab
function buildFullSchedule(principal, annualRate, amortYears, termYears, freqKey="Monthly", extraPmt=0, extraInterval="Monthly") {
  const freqMap = {
    "Monthly":       {ppy:12},
    "Semi-Monthly":  {ppy:24},
    "Bi-Weekly":     {ppy:26},
    "Weekly":        {ppy:52},
    "Acc Bi-Weekly": {ppy:26, acc:true, base:12},
    "Acc Weekly":    {ppy:52, acc:true, base:12},
  };
  const freq = freqMap[freqKey] || freqMap["Monthly"];
  const ppy = freq.ppy;

  let scheduledPmt;
  if (freq.acc) {
    const monthlyPmt = canadianPmt(principal, annualRate, amortYears, 12);
    scheduledPmt = freqKey === "Acc Bi-Weekly"
      ? Math.round(monthlyPmt / 2 * 100) / 100
      : Math.round(monthlyPmt / 4 * 100) / 100;
  } else {
    scheduledPmt = canadianPmt(principal, annualRate, amortYears, ppy);
  }

  const extraEvery = extraInterval === "Annually" ? ppy : extraInterval === "Bi-Weekly" ? Math.round(ppy/26)*2 : Math.round(ppy/12);
  const termN = termYears * ppy;
  let balance = principal;
  let cumInt = 0, cumPrin = 0;
  const payments = [];

  for (let i = 1; i <= amortYears * ppy; i++) {
    if (balance < 0.005) break;
    const r = canadianRate(annualRate, ppy);
    const intPmt = Math.round(r * balance * 100) / 100;
    let thisPmt = Math.min(scheduledPmt, balance + intPmt);
    if (i === amortYears * ppy) thisPmt = balance + intPmt;
    const extra = (extraPmt > 0 && i % extraEvery === 0) ? Math.min(extraPmt, balance + intPmt - thisPmt) : 0;
    const prinPmt = thisPmt - intPmt;
    cumInt  += intPmt;
    cumPrin += prinPmt + extra;
    balance  = Math.max(0, balance - prinPmt - extra);
    if (i <= termN || balance < 0.005) {
      payments.push({ num:i, payment:thisPmt, extra, interest:intPmt, principal:prinPmt, balance });
    }
    if (balance < 0.005) break;
  }

  const termPayments = payments.filter(p => p.num <= termN);
  const termBalance  = termPayments.length ? termPayments[termPayments.length-1].balance : 0;
  const termInterest = termPayments.reduce((s,p)=>s+p.interest,0);
  const termPrin     = termPayments.reduce((s,p)=>s+p.principal+p.extra,0);
  const totalInterest = payments.reduce((s,p)=>s+p.interest,0);
  const actualN = payments.length;

  // Yearly chart
  const yearlyChart = {};
  payments.forEach(p => {
    const yr = Math.ceil(p.num / ppy);
    if (!yearlyChart[yr]) yearlyChart[yr] = {year:yr, interest:0, principal:0, extra:0};
    yearlyChart[yr].interest  += p.interest;
    yearlyChart[yr].principal += p.principal;
    yearlyChart[yr].extra     += p.extra;
  });

  return {scheduledPmt, ppy, termBalance, termInterest, termPrin, totalInterest, actualN,
          nper: amortYears * ppy, payments: payments.slice(0,500),
          yearlyChart: Object.values(yearlyChart)};
}

// ─── RENT VS BUY ENGINE ───────────────────────────────────────────────────────
// All formulas verified against Excel, every year matches exactly
function calcRVB(p) {
  const { homePrice, downPayment, interestRate, amortization,
    buyerUtils, homeIns, condoFee,
    hasRental, rentalMonthly, vacancyRate,
    rentMonthly, rentIncrease, renterUtils, investableDiff,
    investReturn, homeAppreciation, timeHorizon } = p;

  const cmhc = calcCMHC(homePrice, downPayment, amortization);
  const mortgage = homePrice - downPayment + cmhc;
  const closingCosts = homePrice * 0.02;  // AD51 = D6*2%
  const scheduledPmt = canadianPmt(mortgage, interestRate, amortization);

  // Yearly amortization using ROUNDUP cumulative (mirrors T40:U40 array formula)
  const amortRows = buildYearlySummary(mortgage, interestRate, amortization);

  const rows = [];
  for (let yr = 1; yr <= amortization; yr++) {
    const a = amortRows[yr - 1] || { principalPaid: 0, interestPaid: 0 };

    // Home value: ROUND(homePrice*(1+appre)^yr, -2)  — AM89 formula
    const homeValue   = r100(homePrice * Math.pow(1 + homeAppreciation, yr));
    const equityAppr  = homeValue - homePrice;  // AN89

    // Selling costs: homeValue * Z4(0.05)  — AU89 formula
    const sellingCosts = r5(homeValue * 0.05);

    // Cumulative costs
    const maintenance = homePrice * 0.01 * yr;       // AR89: 1%/yr
    const propTax     = homePrice * 0.0075 * yr;     // AS89: 0.75%/yr
    const condoPaid   = condoFee * 12 * yr;          // AT89
    const utilsPaid   = buyerUtils * 12 * yr;        // BI89
    const insPaid     = homeIns * 12 * yr;           // BJ89
    const rentalInc   = hasRental ? rentalMonthly * 12 * (1 - vacancyRate) * yr : 0; // AO89

    // AO35 (Total Equity) = equityAppr + principalPaid + downPayment
    const totalEquity = equityAppr + a.principalPaid + downPayment;  // AO35

    // AO33 (Total Housing Cost) = interest + closing + maintenance + propTax + condoFees + utils + ins - rental
    const totalCost = a.interestPaid + closingCosts + maintenance + propTax + condoPaid + utilsPaid + insPaid - rentalInc; // AO33

    // AO37 = Net Worth Change BEFORE selling = AO35 - AO33  (shown in top summary)
    const netWorthChange = Math.round(totalEquity - totalCost);  // AO37 = 34433 at yr5

    // AA (per AN51 year-table formula) = DP + equityAppr + principal + rental - interest - maintenance - propTax - condoFees
    const AA = downPayment + equityAppr + a.principalPaid + rentalInc
               - a.interestPaid - maintenance - propTax - condoPaid;
    // AN51 = Net Buy AFTER selling = AA - closingCosts - sellingCosts - utilities - homeInsurance
    const netBuy = Math.round(AA - closingCosts - sellingCosts - utilsPaid - insPaid);

    // Investment value: R8 = ROUND(FV(AL3, Years, -(D32*12), -D8, 0), -2)
    // Excel pmt = -(D32*12) — NEGATIVE because cash flows out to investment
    // AR35 = J6 = R8 — all point to the same FV formula which INCLUDES investable diff
    // BC89 (year table) uses identical formula: ROUND(FV(AL3, yr, -(D32*12), -D8, 0), -2)
    const invValue = r100(excelFV(investReturn, yr, -(investableDiff * 12), -downPayment));

    // Rent paid (AW89 = AG20 = S23): ROUNDUP(rent*12*((1+g)^yr-1)/g + renterUtils*12*yr, 0)
    const g = rentIncrease;
    const rentPaid = g === 0
      ? ceil(rentMonthly * 12 * yr + renterUtils * 12 * yr)
      : ceil(rentMonthly * 12 * ((1+g)**yr - 1) / g + renterUtils * 12 * yr);

    // Net Rent = invValue - rentPaid (AR37 = AR35 - AR33 = R8 - AG20, same formula for both summary and table)
    const netRent = Math.round(invValue - rentPaid);

    const diff = netBuy - netRent;

    rows.push({
      year: yr, homeValue, equityAppr,
      principalPaid: a.principalPaid, interestPaid: a.interestPaid,
      maintenance: Math.round(maintenance), propTax: Math.round(propTax),
      sellingCosts, utilsPaid: Math.round(utilsPaid), insPaid: Math.round(insPaid),
      condoPaid: Math.round(condoPaid), rentalInc: Math.round(rentalInc),
      totalEquity: Math.round(totalEquity),   // AO35
      netWorthChange,                          // AO37 = before selling
      netBuy,                                  // AN51 = after selling
      invValue, rentPaid, netRent,             // AR35, AR33, AR37
      diff, outcome: diff > 0 ? "BUY" : diff < 0 ? "RENT" : "EVEN",
    });
  }

  const breakEvenYear = rows.find(r => r.outcome === "BUY")?.year ?? null;
  const horizonRow    = rows.find(r => r.year === timeHorizon) ?? rows[rows.length - 1];

  return { rows, horizonRow, breakEvenYear, scheduledPmt, mortgage, cmhc, closingCosts };
}

// ─── PRE-APPROVAL ENGINE ──────────────────────────────────────────────────────
function calcPA(income, debt, dp, rate, amort, propTax, heating, condo) {
  const sr = stressRate(rate);
  const mInc = income / 12;
  const housingCosts = propTax + heating + condo;
  const maxQGDS = mInc * 0.39 - housingCosts;
  const maxQTDS = mInc * 0.44 - housingCosts - debt;
  const maxQ = Math.min(maxQGDS, maxQTDS);
  const srRate = canadianRate(sr, 12);
  const nper   = amort * 12;
  const maxMortgage = maxQ > 0 ? maxQ * (1 - Math.pow(1+srRate, -nper)) / srRate : 0;
  const maxPrice    = maxMortgage + dp;
  const actualPmt   = canadianPmt(Math.max(0, maxMortgage), rate, amort);
  const qualPmt     = canadianPmt(Math.max(0, maxMortgage), sr,   amort);
  const gds = (qualPmt + housingCosts) / mInc;
  const tds = (qualPmt + housingCosts + debt) / mInc;
  return { maxMortgage, maxPrice, actualPmt, qualPmt, gds, tds, sr,
           md: minDown(maxPrice), cmhc: calcCMHC(maxPrice, dp, amort),
           closingCosts: maxPrice * 0.02 + 1450 };
}

  sel:  { width:"100%", background:C.inputBg, border:`1px solid ${C.border}`, borderRadius:8,
           padding:"8px 11px", color:C.text, fontSize:13, outline:"none" },
  r2:   { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 },
  r3:   { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 },
  div:  { borderTop:`1px solid ${C.border}`, margin:"14px 0" },
  box:  c => ({ background:`${c}12`, border:`1px solid ${c}33`, borderRadius:12, padding:"12px 16px" }),
  g2:   { display:"grid", gridTemplateColumns:"1fr 1fr", gap:11, marginBottom:14 },
  g3:   { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:11, marginBottom:14 },
  info: { background:C.inputBg, borderRadius:8, padding:"8px 12px", fontSize:12, color:C.muted,
           lineHeight:1.6, marginBottom:11 },
  pill: c => ({ display:"inline-block", background:`${c}22`, border:`1px solid ${c}44`,
                color:c, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }),
  th:   l => ({ padding:"8px 10px", background:C.inputBg, color:C.muted, fontWeight:600,
                textAlign:l?"left":"right", borderBottom:`1px solid ${C.border}`,
                whiteSpace:"nowrap", fontSize:11, position:"sticky", top:0 }),
  td:   (c,l) => ({ padding:"6px 10px", borderBottom:`1px solid ${C.border}14`,
                    textAlign:l?"left":"right", color:c||C.text, fontSize:11 }),
  tog:  a => ({ padding:"5px 13px", borderRadius:6, fontSize:12, fontWeight:600, cursor:"pointer",
                border:`1px solid ${a?C.accent:C.border}`, background:a?C.accentDim:"transparent",
                color:a?C.accent:C.muted }),
};

function Field({ label, value, onChange, prefix, suffix, step="any", min=0 }) {
  return (
    <div style={{marginBottom:11}}>
      {label && <label style={S.lbl}>{label}</label>}
      <div style={{position:"relative",display:"flex",alignItems:"center"}}>
        {prefix && <span style={{position:"absolute",left:10,color:C.muted,fontSize:12,pointerEvents:"none"}}>{prefix}</span>}
        <input type="number" step={step} min={min} value={value}
          onChange={e=>onChange(e.target.value)}
          style={{...S.inp,paddingLeft:prefix?22:11,paddingRight:suffix?34:11}} />
        {suffix && <span style={{position:"absolute",right:10,color:C.muted,fontSize:12,pointerEvents:"none"}}>{suffix}</span>}
      </div>
    </div>
  );
}

function Sel({ label, value, onChange, options }) {
  return (
    <div style={{marginBottom:11}}>
      {label && <label style={S.lbl}>{label}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)} style={S.sel}>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

const Tip = ({active,payload,label}) => {
  if (!active||!payload?.length) return null;
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:12}}>
      <div style={{color:C.muted,marginBottom:5,fontWeight:700}}>Year {label}</div>
      {payload.map((p,i)=>(
        <div key={i} style={{color:p.color,marginBottom:2}}>{p.name}: <strong>{fmt(p.value)}</strong></div>
      ))}
    </div>
  );
};

// ─── RENT VS BUY TAB ──────────────────────────────────────────────────────────
function RVBTab() {
  const [p, setP] = useState({
    homePrice:650000, downPayment:65000, interestRate:4, amortization:25,
    buyerUtils:300, homeIns:200, condoFee:0,
    hasRental:false, rentalMonthly:1800, vacancyRate:5,
    rentMonthly:2400, rentIncrease:2, renterUtils:250, investableDiff:0,
    investReturn:7, homeAppreciation:3, timeHorizon:5,
  });
  const s = k => v => setP(prev => ({...prev,[k]:v}));

  const np = useMemo(() => ({
    homePrice:n(p.homePrice), downPayment:n(p.downPayment),
    interestRate:n(p.interestRate)/100, amortization:Math.max(1,n(p.amortization)),
    buyerUtils:n(p.buyerUtils), homeIns:n(p.homeIns), condoFee:n(p.condoFee),
    hasRental:p.hasRental, rentalMonthly:n(p.rentalMonthly), vacancyRate:n(p.vacancyRate)/100,
    rentMonthly:n(p.rentMonthly), rentIncrease:n(p.rentIncrease)/100,
    renterUtils:n(p.renterUtils), investableDiff:n(p.investableDiff),
    investReturn:n(p.investReturn)/100, homeAppreciation:n(p.homeAppreciation)/100,
    timeHorizon:Math.min(n(p.timeHorizon), Math.max(1,n(p.amortization))),
  }), [p]);

  const { rows, horizonRow, breakEvenYear, scheduledPmt, mortgage, cmhc, closingCosts } =
    useMemo(() => calcRVB(np), [np]);

  const winner = horizonRow?.outcome ?? "BUY";
  const hor = np.timeHorizon;

  return (
    <div style={S.grid}>
      {/* ── INPUTS ─────────────────────────────────────── */}
      <div>
        <div style={S.card}>
          <div style={S.sec}>🏠 Home Purchase</div>
          <Field label="Home Price" value={p.homePrice} onChange={s("homePrice")} prefix="$" />
          <div style={{...S.info,marginTop:-5}}>
            Min. Down Payment Required: <strong style={{color:n(p.downPayment)>=minDown(n(p.homePrice))?C.accent:C.red}}>{fmt(minDown(n(p.homePrice)))}</strong>
            {n(p.downPayment) < minDown(n(p.homePrice)) && <span style={{color:C.red}}> ← your down payment is below minimum</span>}
          </div>
          <Field label="Down Payment" value={p.downPayment} onChange={s("downPayment")} prefix="$" />
          <div style={S.info}>
            Mortgage: <strong style={{color:C.accent}}>{fmt(mortgage)}</strong>
            {cmhc>0 && <span style={{color:C.muted}}> (CMHC: {fmt(cmhc)})</span>}<br/>
            Monthly Payment: <strong style={{color:C.gold}}>{fmt(scheduledPmt)}/mo</strong><br/>
            Closing Costs (2%): <strong>{fmt(closingCosts)}</strong>
          </div>
          <div style={S.r2}>
            <Field label="Interest Rate" value={p.interestRate} onChange={s("interestRate")} suffix="%" step="0.01" />
            <Field label="Amortization (yrs)" value={p.amortization} onChange={s("amortization")} step="1" min={1} />
          </div>
          {n(p.amortization)>25 && (
            <div style={{...S.info,color:C.gold,fontSize:11}}>
              ⚠️ Amortization &gt;25 yrs: CMHC rates increase (5-9.99%→4.2%, 10-14.99%→3.3%, 15-19.99%→3.0%)
            </div>
          )}

          <div style={S.div}/>
          <div style={S.sec}>🏡 Monthly Ownership Costs</div>
          <div style={{...S.info,color:C.muted}}>
            📋 Property Tax is calculated as <strong style={{color:C.text}}>0.75% of home price per year</strong>
            &nbsp;= <strong style={{color:C.accent}}>{fmt(n(p.homePrice) * 0.0075 / 12)}/mo</strong>
            &nbsp;· <strong style={{color:C.accent}}>{fmt(n(p.homePrice) * 0.0075)}/yr</strong>
          </div>
          <div style={S.r2}>
            <Field label="Utilities /mo" value={p.buyerUtils} onChange={s("buyerUtils")} prefix="$" />
            <Field label="Home Insurance /mo" value={p.homeIns} onChange={s("homeIns")} prefix="$" />
          </div>
          <Field label="Condo Fee /mo" value={p.condoFee} onChange={s("condoFee")} prefix="$" />

          <div style={{marginBottom:11}}>
            <label style={S.lbl}>Rental Income from this property?</label>
            <div style={{display:"flex",gap:8}}>
              <button style={S.tog(p.hasRental)} onClick={()=>setP(v=>({...v,hasRental:true}))}>Yes</button>
              <button style={S.tog(!p.hasRental)} onClick={()=>setP(v=>({...v,hasRental:false}))}>No</button>
            </div>
          </div>

function AmortTab() {
  const [p, setP] = useState({

  const result = useMemo(() => buildFullSchedule(

              <span style={{fontSize:11,color:C.muted,fontWeight:600}}>{v}</span>

          ))}
          <div style={{...S.info,marginTop:12,marginBottom:0,fontSize:11}}>⚠️ Illustrative only. Consult a licensed mortgage professional.</div>
        </div>

            <div style={{fontSize:16,fontWeight:700,letterSpacing:"-0.5px"}}>HomeIQ Planner</div>
            <div style={{fontSize:10,color:C.muted}}>by Canadian Financial Literacy · @canadianfinancialliteracy</div>
          </div>
        </div>
        <div style={S.tabs}>
          <button style={S.tab(tab==="rvb")}   onClick={()=>setTab("rvb")}>Rent vs Buy</button>
          <button style={S.tab(tab==="amort")} onClick={()=>setTab("amort")}>Amortization</button>
          <button style={S.tab(tab==="pa")}    onClick={()=>setTab("pa")}>Pre-Approval</button>
        </div>
      </div>
      <div style={S.main}>
        {tab==="rvb"   && <RVBTab/>}
        {tab==="amort" && <AmortTab/>}
        {tab==="pa"    && <PATab/>}
      </div>
      <div style={{textAlign:"center",padding:"16px",borderTop:`1px solid ${C.border}`,fontSize:11,color:C.muted}}>
        Created by Nitin Kochhar · For illustrative purposes only · Actual lender results may differ
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
